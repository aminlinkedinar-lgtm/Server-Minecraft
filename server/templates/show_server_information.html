<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Information</title>
</head>
<body>
    {% if user.is_authenticated %}
    
        <h1>server</h1>
        <h2>server_name: {{server_name}},version: {{version}},ip: {{ip}}</h2>
        <h2>{{description}}{{number_of_players}}{{server_status}}</h2>
        <h2>{{creation_data}}{{server_owner}}</h2>
        <a href="{% url 'home' %}">Home</a>    
        {% else %}
        <form method="get" action="{% url 'login' %}">
         <button type="submit">Enter to site</button>
        </form> {% endif %} 
        
         
</body>
</html>
