<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}Minecraft Server{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} mt-3">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
    <div class="container mt-4">

        {% if user.is_authenticated %}

            <a class="btn btn-primary" href="{% url 'home' %}">Home</a>

            <a class="btn btn-success" href="{% url 'server_list' %}">Servers</a>

            <a class="btn btn-info" href="{% url 'profile' %}">Profile</a>

            <form method="post" action="{% url 'logout' %}" class="d-inline">
                {% csrf_token %}
                <button class="btn btn-danger">Logout</button>
            </form>

        {% else %}

            <a class="btn btn-primary" href="{% url 'login' %}">Login</a>

            <a class="btn btn-success" href="{% url 'register_server' %}">Register</a>

        {% endif %}

        <hr>

        {% block content %}

        {% endblock %}

    </div>

</body>
</html>
